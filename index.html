<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ApexFit Dashboard</title>
<!-- Load Chart.js for diagrams -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0c;--s1:#111115;--s2:#18181e;--s3:#22222a;--s4:#2c2c36;
  --lime:#c8ff00;--sky:#38bdf8;--t1:#f1f1f5;--t2:#8888a0;--t3:#44445a;--bd:#2a2a38;
  --r:12px;--mono:'Fira Mono',monospace;--sans:system-ui,sans-serif;
}
body{background:var(--bg);color:var(--t1);font-family:var(--sans);min-height:100vh;overflow-x:hidden}

/* FULL SCREEN LAYOUT */
.app{display:flex;flex-direction:column;min-height:100vh;width:100%}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:20px 40px;border-bottom:1px solid var(--bd);background:var(--bg)}
.logo{font-family:var(--mono);font-size:22px;color:var(--lime);letter-spacing:4px;font-weight:bold}

/* NAVIGATION */
.nav{display:flex;justify-content:center;gap:20px;padding:10px;background:var(--s1);border-bottom:1px solid var(--bd)}
.nb{padding:12px 24px;border:none;background:none;color:var(--t3);cursor:pointer;display:flex;align-items:center;gap:8px;font-weight:600;transition:0.2s}
.nb svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2}
.nb.on{color:var(--lime);border-bottom:2px solid var(--lime)}

/* CONTENT GRID */
.content{flex:1;padding:30px 40px;overflow-y:auto}
.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
  gap: 24px;
  margin-top: 20px;
}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:24px;position:relative}
h2{font-size:12px;text-transform:uppercase;letter-spacing:2px;color:var(--t3);margin-bottom:20px;font-family:var(--mono)}

/* STAT BOXES */
.srow{display:grid;grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));gap:16px;margin-bottom:24px}
.sbox{background:var(--s2);border-radius:var(--r);padding:20px;text-align:center;border:1px solid var(--bd)}
.sval{font-size:28px;font-weight:bold;font-family:var(--mono);color:var(--lime)}
.slab{font-size:10px;color:var(--t3);text-transform:uppercase;margin-top:4px}

/* BUTTONS */
.cbtn{width:100%;padding:18px;border:none;border-radius:var(--r);background:var(--lime);color:#000;font-weight:bold;cursor:pointer;margin-top:20px}
.cbtn:disabled{opacity:0.3}

.toast{position:fixed;bottom:24px;right:24px;background:var(--lime);color:#000;padding:12px 24px;border-radius:30px;font-weight:bold;display:none}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="logo">APEXFIT PRO</div>
    <div id="wkBadge" style="color:var(--t2);font-family:var(--mono)">WEEK 1</div>
  </div>
  
  <div class="nav">
    <button class="nb on" onclick="switchTab('plan')">Plan</button>
    <button class="nb" onclick="switchTab('stats')">Analytics</button>
    <button class="nb" onclick="switchTab('history')">History</button>
  </div>

  <div class="content" id="content"></div>
  <div class="toast" id="toast"></div>
</div>

<script>
// --- CONFIGURATION ---
const RAILWAY_API_URL = "https://your-backend-api.up.railway.app/save-workout"; 

let S = {
  week: 1, prog: 'strength', tab: 'plan', session: null,
  logs: {}, prs: {}, completedKeys: []
};

// Original exercise database for logic
const EX_DB = {
  'Bench Press':{muscle:'Chest',w:50,r:5,prog:2.5},
  'Squat':{muscle:'Legs',w:60,r:5,prog:5},
  'Deadlift':{muscle:'Back',w:70,r:5,prog:5},
  'Overhead Press':{muscle:'Shoulders',w:35,r:5,prog:2.5}
};

function switchTab(tab) {
  S.tab = tab;
  render();
}

async function completeSession() {
  const k = "log_" + Date.now();
  const workoutData = { sessionDate: new Date().toISOString(), data: S.logs };
  
  // Vibe Check: Sync to Railway
  try {
    await fetch(postgresql:BAxLFvDOMgRorMRSAIpgwrMUqhpsBLJB@postgres.railway.internal:5432/railway, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(workoutData)
    });
    showToast("Cloud Sync Successful!");
  } catch(e) {
    showToast("Saved Locally");
  }
  
  S.tab = 'stats';
  render();
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

function render() {
  const c = document.getElementById('content');
  if (S.tab === 'plan') {
    c.innerHTML = `
      <div class="dashboard-grid">
        <div class="card">
          <h2>Active Program</h2>
          <div class="sval">Strength (PPL)</div>
          <button class="cbtn" onclick="completeSession()">Start Today's Session</button>
        </div>
        <div class="card">
          <h2>Quick Tips</h2>
          <p style="color:var(--t2)">Remember to use 4 puffs of hair product for volume after the gym!</p>
        </div>
      </div>
    `;
  } else if (S.tab === 'stats') {
    c.innerHTML = `
      <div class="srow">
        <div class="sbox"><div class="sval">12</div><div class="slab">Workouts</div></div>
        <div class="sbox"><div class="sval">4.5k</div><div class="slab">Total Volume (kg)</div></div>
        <div class="sbox"><div class="sval">85%</div><div class="slab">Consistency</div></div>
      </div>
      <div class="dashboard-grid">
        <div class="card"><canvas id="volumeChart"></canvas></div>
        <div class="card"><canvas id="muscleChart"></canvas></div>
      </div>
    `;
    setTimeout(initCharts, 100); // Wait for canvas to render
  }
}

function initCharts() {
  // Volume Trend Diagram
  new Chart(document.getElementById('volumeChart'), {
    type: 'line',
    data: {
      labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
      datasets: [{
        label: 'Weight Volume',
        data: [1200, 1900, 0, 2100, 1800, 2500],
        borderColor: '#c8ff00',
        tension: 0.4
      }]
    },
    options: { plugins: { legend: { display: false } } }
  });

  // Muscle Distribution Diagram[cite: 1]
  new Chart(document.getElementById('muscleChart'), {
    type: 'doughnut',
    data: {
      labels: ['Chest', 'Legs', 'Back', 'Arms'],
      datasets: [{
        data: [30, 40, 20, 10],
        backgroundColor: ['#c8ff00', '#38bdf8', '#fbbf24', '#f43f5e']
      }]
    }
  });
}

render();
</script>
</body>
</html>
