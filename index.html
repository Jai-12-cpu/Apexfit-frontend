<script>
// 1. Configuration & Global State
const RAILWAY_API_URL = "https://fastapi-production-cee9.up.railway.app/save-workout";

// Define S globally so the console and buttons can see it
window.S = {
  tab: 'plan',
  logs: [
    { name: "Bench Press", sets: "4 × 5 @ 90 kg", muscle: "Chest" },
    { name: "Overhead Press", sets: "3 × 8 @ 55 kg", muscle: "Shoulders" }
  ],
  isSessionActive: false
};

// 2. Tab Navigation
function switchTab(tab, btn) {
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
  
  const targetTab = document.getElementById('tab-' + tab);
  if (targetTab) {
    targetTab.classList.add('active');
    S.tab = tab;
  }
  
  btn.classList.add('on');
  if (tab === 'analytics') setTimeout(initAnalyticsCharts, 50);
  if (tab === 'history') setTimeout(initHistoryChart, 50);
}

// 3. Session Logic
function startSession() {
  S.isSessionActive = true;
  showToast('Session started! Go crush it.');
  
  // Change the button to a "Complete" button
  const btn = document.querySelector('.cbtn');
  btn.textContent = "🏁 Complete Session";
  btn.style.background = "var(--sky)";
  btn.onclick = completeSession; 
}

async function completeSession() {
  showToast('Syncing with Railway...');
  
  const workoutData = {
    sessionDate: new Date().toLocaleString(),
    data: S.logs,
    totalVolume: 4820 // Hardcoded for now based on your UI
  };

  try {
    const response = await fetch(RAILWAY_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(workoutData)
    });

    if (response.ok) {
      showToast('Cloud Sync Successful! ✓');
      // Reset button
      const btn = document.querySelector('.cbtn');
      btn.textContent = "▶ Start Session";
      btn.style.background = "var(--lime)";
      btn.onclick = startSession;
    } else {
      throw new Error('Server error');
    }
  } catch (err) {
    console.error("Sync failed:", err);
    showToast('Sync Failed - Check Console');
  }
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; 
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

// ... Keep your existing Chart.js init functions (initAnalyticsCharts, etc.) below this ...
</script>
